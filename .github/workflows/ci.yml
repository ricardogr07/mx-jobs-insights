name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        id: install
        run: python -m pip install -e ".[dev]"

      - name: Install build tools
        id: install_build
        run: python -m pip install wheel build

      - name: Run Ruff
        id: ruff
        run: python -m ruff check src tests

      - name: Run Pytest
        id: pytest
        run: python -m pytest -q --basetemp .pytest_tmp

      - name: Build docs strictly
        id: mkdocs
        run: python -m mkdocs build --strict

      - name: Build package
        id: build
        run: python -m build --no-isolation

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# CI summary"
            echo
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref_name }}\`"
            echo "- Ruff: \`${{ steps.ruff.outcome }}\`"
            echo "- Pytest: \`${{ steps.pytest.outcome }}\`"
            echo "- MkDocs strict build: \`${{ steps.mkdocs.outcome }}\`"
            echo "- Package build: \`${{ steps.build.outcome }}\`"
            echo "- Public site: [mx-jobs-insights](${PAGES_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
