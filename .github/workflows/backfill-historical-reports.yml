name: Backfill Historical Reports

on:
  workflow_dispatch:
    inputs:
      regenerate_site:
        description: Regenerate and deploy the site after backfill completes.
        required: true
        type: boolean
        default: true

concurrency:
  group: backfill-historical-reports
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MX_JOBS_OPENAI_MODEL: ${{ vars.MX_JOBS_OPENAI_MODEL }}
      MX_JOBS_PUBLIC_KEY_SALT: ${{ secrets.MX_JOBS_PUBLIC_KEY_SALT }}
      MX_JOBS_OPENAI_BASE_URL: ${{ vars.MX_JOBS_OPENAI_BASE_URL }}
      PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout this repository
        id: checkout_repo
        uses: actions/checkout@v4

      - name: Checkout upstream workspace
        id: checkout_upstream
        uses: actions/checkout@v4
        with:
          repository: ricardogr07/LinkedInWebScraper
          ref: data
          path: LinkedInWebScraper

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        id: install
        run: python -m pip install -e ".[dev]"

      - name: Run full pipeline to generate curated data
        id: run_pipeline
        shell: bash
        run: |
          set -euo pipefail
          echo "Generating curated data from upstream source..."
          python -m mexico_linkedin_jobs_portfolio pipeline \
            --cadence weekly \
            --source auto \
            --upstream-root LinkedInWebScraper \
            --curated-root artifacts/curated \
            --report-root artifacts/reports \
            --docs-root docs \
            --locale all
          echo "Curated data generated successfully!"

      - name: Run historical report backfill
        id: run_backfill
        shell: bash
        run: |
          set -euo pipefail
          echo "Starting historical report backfill with posted-date filtering..."
          python scripts/backfill_historical_reports.py
          echo "Backfill completed successfully!"

      - name: Regenerate site from backfilled reports
        id: regenerate_site
        if: inputs.regenerate_site
        shell: bash
        run: |
          set -euo pipefail
          echo "Generating public site from backfilled reports..."
          python -m mexico_linkedin_jobs_portfolio site \
            --report-root artifacts/reports \
            --docs-root docs \
            --locale all
          echo "Building MkDocs site..."
          mkdocs build --site-dir site
          echo "Site regeneration completed!"

      - name: Prepare diagnostic artifacts
        id: prepare_diagnostics
        shell: bash
        run: |
          set -euo pipefail
          diagnostics_root="artifacts/diagnostics"
          mkdir -p "${diagnostics_root}/reports"
          
          # Archive run summaries
          while IFS= read -r file; do
            rel_path="${file#artifacts/reports/}"
            target="${diagnostics_root}/reports/${rel_path}"
            mkdir -p "$(dirname "${target}")"
            cp "${file}" "${target}"
          done < <(find artifacts/reports -type f \( -name 'run_summary.json' -o -name 'metrics.json' \) 2>/dev/null | sort)
          
          # Create backfill summary
          {
            echo "# Backfill Job Summary"
            echo ""
            echo "Timestamp: $(date -u --iso-8601=seconds)"
            echo ""
            echo "## Reports Regenerated"
            echo ""
            if [[ -d artifacts/reports/weekly ]]; then
              echo "### Weekly Reports"
              find artifacts/reports/weekly -type d -maxdepth 1 | sort | while read -r dir; do
                [[ "$dir" == "artifacts/reports/weekly" ]] && continue
                week_id=$(basename "$dir")
                if [[ -f "$dir/metrics.json" ]]; then
                  echo "- \`$week_id\` - metrics available"
                fi
              done
            fi
            echo ""
            if [[ -d artifacts/reports/monthly ]]; then
              echo "### Monthly Reports"
              find artifacts/reports/monthly -type d -maxdepth 1 | sort | while read -r dir; do
                [[ "$dir" == "artifacts/reports/monthly" ]] && continue
                month_id=$(basename "$dir")
                if [[ -f "$dir/metrics.json" ]]; then
                  echo "- \`$month_id\` - metrics available"
                fi
              done
            fi
          } > "${diagnostics_root}/BACKFILL_SUMMARY.md"

      - name: Upload diagnostic artifact
        id: upload_diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: backfill-diagnostics
          path: artifacts/diagnostics
          retention-days: 30

      - name: Upload GitHub Pages artifact
        id: upload_pages_artifact
        if: inputs.regenerate_site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deploy_pages
        if: inputs.regenerate_site
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          regenerate_site="${{ inputs.regenerate_site }}"
          {
            echo "# Backfill Workflow Summary"
            echo ""
            echo "## Execution Details"
            echo "- Triggered: Manual (\`workflow_dispatch\`)"
            echo "- Timestamp: $(date -u --iso-8601=seconds)"
            echo ""
            echo "## Job Status"
            echo "- Backfill: \`${{ steps.run_backfill.outcome }}\`"
            echo "- Site regeneration: \`${{ steps.regenerate_site.outcome }}\`"
            echo "- Diagnostics upload: \`${{ steps.upload_diagnostics.outcome }}\`"
            echo "- Pages deployment: \`${{ steps.deploy_pages.outcome }}\`"
            echo ""
            echo "## Outputs"
            if [[ "${regenerate_site}" == "true" ]]; then
              echo "- Public site deployed: [mx-jobs-insights](${PAGES_URL})"
            else
              echo "- Site regeneration skipped (reports only)"
            fi
            echo "- Diagnostic artifacts available as workflow artifacts"
            echo ""
            echo "## Next Steps"
            echo "1. Review the backfilled reports on the public site"
            echo "2. Verify job counts and date distributions look correct"
            echo "3. Check that the site navigation includes all new periods"
            echo "4. From Monday forward, use the normal publish-portfolio-site workflow"
          } >> "$GITHUB_STEP_SUMMARY"
